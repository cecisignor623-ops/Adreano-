<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>Feed 05 — Question Hook (1080x1080)</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#222;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px;font-family:'Inter',sans-serif}
  .ad{
    width:1080px;height:1080px;
    background:
      radial-gradient(ellipse at 30% 30%,rgba(212,175,114,0.18),transparent 55%),
      radial-gradient(ellipse at 70% 70%,rgba(212,175,114,0.1),transparent 55%),
      #0b0a08;
    position:relative;overflow:hidden;
    display:flex;flex-direction:column;justify-content:space-between;
    padding:90px 80px;color:#f6efe2;
  }
  .ad::before{
    content:"";position:absolute;inset:0;
    background-image:radial-gradient(circle at 1px 1px,rgba(212,175,114,0.06) 1px,transparent 0);
    background-size:50px 50px;pointer-events:none;
  }
  .ad::after{
    content:"";position:absolute;inset:40px;border:1px solid rgba(212,175,114,0.2);border-radius:14px;pointer-events:none;
  }
  .top{position:relative;z-index:2;text-align:center}
  .pretitle{
    display:inline-block;
    font-size:14px;letter-spacing:.32em;text-transform:uppercase;
    color:#d4af72;font-weight:700;
    border:1px solid rgba(212,175,114,0.4);padding:10px 28px;border-radius:99px;
    background:rgba(212,175,114,0.05);
  }
  .question{
    flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;
    text-align:center;position:relative;z-index:2;gap:30px;
  }
  .question h1{
    font-family:'Cormorant Garamond',serif;
    font-size:130px;line-height:1.05;font-weight:600;
    color:#f6efe2;letter-spacing:-0.025em;
    max-width:920px;
  }
  .question h1 em{color:#f0cd92;font-style:italic}
  .answer{
    font-size:24px;color:#a9a193;font-weight:300;
    max-width:680px;line-height:1.5;letter-spacing:0.005em;
  }
  .answer strong{color:#f6efe2;font-weight:500}
  .bottom{
    position:relative;z-index:2;text-align:center;
    border-top:1px solid rgba(212,175,114,0.2);padding-top:30px;
  }
  .bottom-name{
    font-family:'Cormorant Garamond',serif;font-size:34px;color:#f0cd92;font-weight:600;letter-spacing:-0.01em;
    margin-bottom:8px;
  }
  .bottom-info{font-size:15px;color:#a9a193;letter-spacing:.22em;text-transform:uppercase;font-weight:500}
  .bottom-info strong{color:#f6efe2}
</style>
</head>
<body>
<div class="ad">
  <div class="top">
    <span class="pretitle">Heranças Invisíveis</span>
  </div>

  <div class="question">
    <h1>Por que tudo<br/><em>se repete</em>?</h1>
    <div class="answer">Não é destino. Não é falta de fé. É um <strong>sistema invisível</strong> passando de geração em geração — esperando alguém interromper.</div>
  </div>

  <div class="bottom">
    <div class="bottom-name">1h30 que reescreve sua história</div>
    <div class="bottom-info">20/05 · Maringá-PR · <strong>45 vagas</strong></div>
  </div>
</div>
</body>
</html>
