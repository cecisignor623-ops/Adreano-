<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>Feed 09 — Face Close-up + Bold Question (1080x1080)</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#222;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px;font-family:'Inter',sans-serif}
  .ad{
    width:1080px;height:1080px;
    position:relative;overflow:hidden;
  }
  .photo-bg{
    position:absolute;inset:0;
    background-image:url('adreano.jpg');
    background-size:300%;
    background-position:34% 32%;
    filter:saturate(0.85) contrast(1.1) brightness(0.85);
  }
  .photo-overlay{
    position:absolute;inset:0;
    background:
      linear-gradient(180deg,rgba(0,0,0,0.55) 0%,rgba(0,0,0,0.15) 35%,rgba(0,0,0,0.6) 70%,rgba(0,0,0,0.95) 100%),
      radial-gradient(circle at 30% 40%,transparent 0%,rgba(0,0,0,0.5) 100%);
  }
  .top{
    position:absolute;top:60px;left:50px;right:50px;
    z-index:2;text-align:center;
  }
  .badge{
    display:inline-block;
    background:#dc2626;color:#fef2f2;
    font-size:18px;font-weight:800;letter-spacing:0.18em;text-transform:uppercase;
    padding:12px 28px;border-radius:6px;
    box-shadow:0 4px 20px rgba(220,38,38,0.5);
    transform:rotate(-2deg);
  }
  .question{
    position:absolute;top:50%;left:0;right:0;transform:translateY(-50%);
    text-align:center;z-index:2;padding:0 50px;
  }
  .question-text{
    font-size:130px;line-height:0.95;font-weight:900;color:#ffffff;
    letter-spacing:-0.04em;
    text-shadow:0 4px 30px rgba(0,0,0,0.85);
    margin-bottom:20px;
  }
  .question-text .em{
    background:#fde047;color:#0e0c09;
    padding:0 16px;display:inline-block;
    transform:rotate(-1deg);
    box-shadow:0 8px 25px rgba(253,224,71,0.4);
  }
  .answer{
    font-size:28px;color:#fef3c7;font-weight:600;line-height:1.35;
    max-width:780px;margin:0 auto;
    text-shadow:0 2px 10px rgba(0,0,0,0.8);
  }
  .bottom{
    position:absolute;bottom:0;left:0;right:0;
    background:rgba(0,0,0,0.85);
    padding:28px 50px;z-index:2;
    backdrop-filter:blur(10px);
    border-top:3px solid #fde047;
    display:flex;align-items:center;justify-content:space-between;
  }
  .speaker-info{
    color:#fef3c7;font-size:20px;font-weight:600;
    line-height:1.3;
  }
  .speaker-info strong{
    color:#fde047;font-size:26px;font-weight:900;display:block;
  }
  .cta-button{
    background:#fde047;color:#0e0c09;
    padding:18px 36px;border-radius:999px;
    font-size:22px;font-weight:900;letter-spacing:0.03em;text-transform:uppercase;
    box-shadow:0 6px 25px rgba(253,224,71,0.4);
  }
</style>
</head>
<body>
<div class="ad">
  <div class="photo-bg"></div>
  <div class="photo-overlay"></div>

  <div class="top">
    <div class="badge">⚡ ÚLTIMAS 45 VAGAS · MARINGÁ</div>
  </div>

  <div class="question">
    <div class="question-text">
      Por que tudo<br/>se <span class="em">repete</span>?
    </div>
    <div class="answer">A resposta não está em você — está na sua linhagem. E pode ser quebrada.</div>
  </div>

  <div class="bottom">
    <div class="speaker-info">
      <strong>20 DE MAIO · 19h</strong>
      Com Adreano Vitor de Lima
    </div>
    <div class="cta-button">Quero entender →</div>
  </div>
</div>
</body>
</html>
