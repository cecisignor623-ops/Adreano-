<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>Estático 02 — Autoridade / Credencial (1080x1080)</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#111;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px;font-family:'Inter',sans-serif}
  .ad{
    width:1080px;height:1080px;
    position:relative;overflow:hidden;
    background:#0b1120;
    color:#f0ece4;
  }

  /* Foto Adriano — lado direito, igual à imagem 1 */
  .photo{
    position:absolute;
    top:0;right:0;bottom:0;
    width:590px;
    background-image:url('adreano.jpg');
    background-size:cover;
    background-position:center top;
  }
  .photo-fade{
    position:absolute;
    top:0;right:0;bottom:0;
    width:590px;
    background:linear-gradient(90deg,
      #0b1120 0%,
      rgba(11,17,32,0.75) 35%,
      rgba(11,17,32,0.2) 70%,
      rgba(11,17,32,0.05) 100%
    );
  }
  .photo-bottom{
    position:absolute;
    bottom:0;left:0;right:0;height:280px;
    background:linear-gradient(0deg,#0b1120 0%,transparent 100%);
  }

  /* Textura sutil */
  .texture{
    position:absolute;inset:0;
    background-image:
      repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,0.008) 2px,rgba(255,255,255,0.008) 4px);
    pointer-events:none;z-index:1;
  }

  /* Linha dourada vertical decorativa */
  .gold-line{
    position:absolute;
    top:80px;bottom:80px;
    left:470px;
    width:2px;
    background:linear-gradient(180deg,transparent 0%,#c9a043 20%,#c9a043 80%,transparent 100%);
    z-index:3;
    opacity:0.5;
  }

  /* Borda dourada superior */
  .top-accent{
    position:absolute;top:0;left:0;right:0;
    height:3px;
    background:linear-gradient(90deg,#c9a043 0%,#e8c96a 40%,transparent 100%);
    z-index:5;
  }

  /* Conteúdo — lado esquerdo, mesmo padrão da imagem 1 */
  .content{
    position:absolute;
    top:0;left:0;bottom:0;
    width:520px;
    z-index:4;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    padding:72px 60px 72px 72px;
  }

  /* Badge topo — idêntico à imagem 1 */
  .badge{
    display:inline-flex;align-items:center;gap:10px;
    background:rgba(201,160,67,0.15);
    border:1px solid rgba(201,160,67,0.45);
    border-radius:6px;
    padding:10px 18px;
    width:fit-content;
  }
  .badge-dot{width:8px;height:8px;background:#c9a043;border-radius:50%;flex-shrink:0}
  .badge-text{
    font-size:13px;letter-spacing:.22em;text-transform:uppercase;
    font-weight:700;color:#c9a043;
  }

  /* Meio — headline */
  .middle{
    flex:1;
    display:flex;flex-direction:column;justify-content:center;
    padding:20px 0;
  }
  .overline{
    font-size:13px;letter-spacing:.3em;text-transform:uppercase;
    color:#5a7a9e;font-weight:600;margin-bottom:20px;
  }
  .headline{
    font-family:'Inter',sans-serif;
    font-size:58px;line-height:1.05;font-weight:900;
    color:#f0ece4;letter-spacing:-0.03em;
    margin-bottom:28px;
  }
  .headline em{
    font-style:normal;
    color:#c9a043;
  }
  .subline{
    font-size:19px;line-height:1.55;font-weight:400;
    color:#7a8fa8;
    max-width:370px;
    border-left:3px solid #c9a043;
    padding-left:16px;
  }

  /* Rodapé */
  .footer-content{display:flex;flex-direction:column;gap:12px}
  .divider{height:1px;background:linear-gradient(90deg,rgba(201,160,67,0.5),transparent);margin-bottom:2px}
  .date-info{
    font-size:15px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
    color:#c9a043;
  }

  /* Nome + credenciais em linha compacta */
  .name-block{display:flex;flex-direction:column;gap:8px}
  .name-line{
    font-size:16px;font-weight:700;color:#e0d5c1;letter-spacing:.03em;
  }
  .creds-line{
    display:flex;align-items:center;gap:0;
    font-size:12px;letter-spacing:.14em;text-transform:uppercase;
    color:#5a7a9e;font-weight:600;
  }
  .cred-sep{
    margin:0 10px;color:#c9a043;font-size:10px;
  }

  .vagas-info{
    font-size:13px;letter-spacing:.12em;text-transform:uppercase;
    color:#5a7a9e;font-weight:500;
  }
  .vagas-info strong{color:#e0d5c1;font-weight:700}
</style>
</head>
<body>
<div class="ad">
  <div class="photo"></div>
  <div class="photo-fade"></div>
  <div class="photo-bottom"></div>
  <div class="texture"></div>
  <div class="gold-line"></div>
  <div class="top-accent"></div>

  <div class="content">
    <!-- Badge topo — igual à imagem 1 -->
    <div class="badge">
      <div class="badge-dot"></div>
      <div class="badge-text">Imersão de Liderança</div>
    </div>

    <!-- Headline principal no bloco escuro, sem foto por baixo -->
    <div class="middle">
      <div class="overline">O que nenhum curso de gestão ensina</div>
      <div class="headline">
        Aprenda a identificar<br/>
        um líder <em>antes</em><br/>
        de contratar.
      </div>
      <div class="subline">
        Quem contrata pela intuição erra. Quem contrata pelo método acerta.
      </div>
    </div>

    <!-- Rodapé com nome + credenciais em linha -->
    <div class="footer-content">
      <div class="divider"></div>
      <div class="date-info">22 e 23 de Agosto · 2025</div>
      <div class="name-block">
        <div class="name-line">Adreano Vitor de Lima</div>
        <div class="creds-line">
          <span>Psicanalista</span>
          <span class="cred-sep">·</span>
          <span>Hipnoterapeuta</span>
          <span class="cred-sep">·</span>
          <span>PNL</span>
        </div>
      </div>
      <div class="vagas-info"><strong>Vagas limitadas</strong> · Evento presencial</div>
    </div>
  </div>
</div>
</body>
</html>
