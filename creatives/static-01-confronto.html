<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>Estático 01 — Confronto Direto (1080x1080)</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#111;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px;font-family:'Inter',sans-serif}
  .ad{
    width:1080px;height:1080px;
    position:relative;overflow:hidden;
    background:#0b1120;
    color:#f0ece4;
  }

  /* Foto Adriano — lado direito, 55% do quadro */
  .photo{
    position:absolute;
    top:0;right:0;bottom:0;
    width:590px;
    background-image:url('adreano.jpg');
    background-size:cover;
    background-position:center top;
  }
  /* Gradiente lateral: escuro à esquerda, transparente à direita */
  .photo-fade{
    position:absolute;
    top:0;right:0;bottom:0;
    width:590px;
    background:linear-gradient(90deg,
      #0b1120 0%,
      rgba(11,17,32,0.75) 35%,
      rgba(11,17,32,0.2) 70%,
      rgba(11,17,32,0.05) 100%
    );
  }
  /* Gradiente inferior */
  .photo-bottom{
    position:absolute;
    bottom:0;left:0;right:0;height:280px;
    background:linear-gradient(0deg,#0b1120 0%,transparent 100%);
  }

  /* Textura sutil */
  .texture{
    position:absolute;inset:0;
    background-image:
      repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,0.008) 2px,rgba(255,255,255,0.008) 4px);
    pointer-events:none;z-index:1;
  }

  /* Linha dourada vertical decorativa */
  .gold-line{
    position:absolute;
    top:80px;bottom:80px;
    left:470px;
    width:2px;
    background:linear-gradient(180deg,transparent 0%,#c9a043 20%,#c9a043 80%,transparent 100%);
    z-index:3;
    opacity:0.5;
  }

  /* Conteúdo — lado esquerdo */
  .content{
    position:absolute;
    top:0;left:0;bottom:0;
    width:520px;
    z-index:4;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    padding:72px 60px 72px 72px;
  }

  /* Topo */
  .top{display:flex;flex-direction:column;gap:0}
  .badge{
    display:inline-flex;align-items:center;gap:10px;
    background:rgba(201,160,67,0.15);
    border:1px solid rgba(201,160,67,0.45);
    border-radius:6px;
    padding:10px 18px;
    width:fit-content;
    margin-bottom:28px;
  }
  .badge-dot{width:8px;height:8px;background:#c9a043;border-radius:50%;flex-shrink:0}
  .badge-text{
    font-size:13px;letter-spacing:.22em;text-transform:uppercase;
    font-weight:700;color:#c9a043;
  }
  .event-label{
    font-size:15px;letter-spacing:.28em;text-transform:uppercase;
    color:#8a9bb5;font-weight:500;
    margin-bottom:10px;
  }

  /* Meio — headline principal */
  .middle{flex:1;display:flex;flex-direction:column;justify-content:center;padding:20px 0}
  .overline{
    font-size:13px;letter-spacing:.3em;text-transform:uppercase;
    color:#5a7a9e;font-weight:600;margin-bottom:20px;
  }
  .headline{
    font-family:'Inter',sans-serif;
    font-size:72px;line-height:1.0;font-weight:900;
    color:#f0ece4;letter-spacing:-0.03em;
    margin-bottom:28px;
  }
  .headline em{
    font-style:normal;
    color:#c9a043;
    display:block;
  }
  .subline{
    font-size:20px;line-height:1.5;font-weight:400;
    color:#7a8fa8;
    max-width:380px;
    border-left:3px solid #c9a043;
    padding-left:16px;
  }

  /* Rodapé */
  .footer-content{display:flex;flex-direction:column;gap:14px}
  .divider{height:1px;background:linear-gradient(90deg,rgba(201,160,67,0.5),transparent)}
  .date-info{
    font-size:15px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
    color:#c9a043;
  }
  .vagas-info{
    font-size:13px;letter-spacing:.12em;text-transform:uppercase;
    color:#5a7a9e;font-weight:500;
  }
  .vagas-info strong{color:#e0d5c1;font-weight:700}
  .name-line{
    font-size:13px;color:#3d5068;letter-spacing:.05em;
    font-weight:500;
  }

  /* Marca d'água de número no canto */
  .bg-number{
    position:absolute;
    bottom:-40px;right:20px;
    font-size:320px;font-weight:900;
    color:rgba(201,160,67,0.04);
    line-height:1;
    z-index:2;
    letter-spacing:-0.05em;
    font-family:'Inter',sans-serif;
    pointer-events:none;
  }

  /* Borda dourada superior */
  .top-accent{
    position:absolute;top:0;left:0;right:0;
    height:3px;
    background:linear-gradient(90deg,#c9a043 0%,#e8c96a 40%,transparent 100%);
    z-index:5;
  }
</style>
</head>
<body>
<div class="ad">
  <div class="photo"></div>
  <div class="photo-fade"></div>
  <div class="photo-bottom"></div>
  <div class="texture"></div>
  <div class="gold-line"></div>
  <div class="top-accent"></div>
  <div class="bg-number">22</div>

  <div class="content">
    <div class="top">
      <div class="badge">
        <div class="badge-dot"></div>
        <div class="badge-text">Imersão de Liderança</div>
      </div>
    </div>

    <div class="middle">
      <div class="overline">O problema que está te custando caro</div>
      <div class="headline">
        Pare de<br/>
        contratar<br/>
        <em>errado.</em>
      </div>
      <div class="subline">
        Cada contratação errada custa entre 3x e 15x o salário do profissional.
      </div>
    </div>

    <div class="footer-content">
      <div class="divider"></div>
      <div class="date-info">22 e 23 de Agosto · 2025</div>
      <div class="vagas-info"><strong>Vagas limitadas</strong> · Evento presencial</div>
      <div class="name-line">Adreano Vitor de Lima</div>
    </div>
  </div>
</div>
</body>
</html>
