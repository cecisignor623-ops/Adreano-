<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>Feed 08 — Antes/Depois Split (1080x1080)</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#222;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px;font-family:'Inter',sans-serif}
  .ad{
    width:1080px;height:1080px;
    position:relative;overflow:hidden;
    background:#0e0c09;
  }
  .split{
    position:absolute;inset:0;display:flex;
  }
  .side{
    flex:1;padding:80px 50px 70px;
    display:flex;flex-direction:column;justify-content:space-between;
    position:relative;
  }
  .side.before{
    background:linear-gradient(180deg,#1a1a1a 0%,#0e0c09 100%);
    color:#9ca3af;
  }
  .side.after{
    background:linear-gradient(180deg,#fde047 0%,#facc15 100%);
    color:#0e0c09;
    overflow:hidden;
  }
  .side.after::before{
    content:"";position:absolute;top:-20px;right:-20px;width:280px;height:280px;
    background:radial-gradient(circle,rgba(255,255,255,0.4),transparent 70%);
    border-radius:50%;pointer-events:none;
  }
  .label{
    position:relative;z-index:2;
    font-size:22px;font-weight:900;letter-spacing:0.25em;text-transform:uppercase;
    margin-bottom:32px;align-self:flex-start;
    padding:10px 20px;border-radius:6px;
  }
  .before .label{
    background:rgba(239,68,68,0.15);color:#fca5a5;
    border:2px solid rgba(239,68,68,0.4);
  }
  .after .label{
    background:#0e0c09;color:#fde047;
  }
  .content{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;justify-content:center;gap:18px}
  .item{
    font-size:26px;font-weight:600;line-height:1.3;
    display:flex;align-items:center;gap:14px;
  }
  .item .icon{
    flex-shrink:0;width:36px;height:36px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:22px;font-weight:900;
  }
  .before .item{color:#d4d4d4}
  .before .item.dim{color:#6b7280;text-decoration:line-through;text-decoration-color:rgba(239,68,68,0.6);text-decoration-thickness:3px}
  .before .item .icon{background:rgba(239,68,68,0.2);color:#fca5a5;border:2px solid rgba(239,68,68,0.4)}
  .after .item{color:#0e0c09;font-weight:700}
  .after .item .icon{background:#0e0c09;color:#fde047}
  .divider{
    position:absolute;top:0;bottom:0;left:50%;width:6px;
    background:#0e0c09;
    transform:translateX(-50%);z-index:3;
  }
  .arrow{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    width:120px;height:120px;border-radius:50%;
    background:#fde047;border:6px solid #0e0c09;
    display:flex;align-items:center;justify-content:center;
    z-index:4;font-size:64px;color:#0e0c09;font-weight:900;
    box-shadow:0 8px 30px rgba(0,0,0,0.4);
  }
  .footer{
    position:absolute;bottom:0;left:0;right:0;
    background:#0e0c09;color:#fef3c7;
    padding:24px 50px;
    display:flex;align-items:center;justify-content:space-between;
    z-index:5;
    border-top:4px solid #fde047;
  }
  .footer-text{font-size:24px;font-weight:700}
  .footer-text strong{color:#fde047}
  .cta{
    background:#fde047;color:#0e0c09;
    padding:14px 28px;border-radius:999px;
    font-size:20px;font-weight:900;letter-spacing:0.02em;text-transform:uppercase;
  }
</style>
</head>
<body>
<div class="ad">
  <div class="split">
    <div class="side before">
      <div class="label">⛓️ Antes</div>
      <div class="content">
        <div class="item dim"><span class="icon">✕</span>Mesmas brigas, mesma dor</div>
        <div class="item dim"><span class="icon">✕</span>Bloqueio com dinheiro</div>
        <div class="item dim"><span class="icon">✕</span>Auto-sabotagem</div>
        <div class="item dim"><span class="icon">✕</span>Ansiedade sem fim</div>
      </div>
    </div>
    <div class="side after">
      <div class="label">✨ Depois</div>
      <div class="content">
        <div class="item"><span class="icon">✓</span>Padrão identificado</div>
        <div class="item"><span class="icon">✓</span>Carga devolvida</div>
        <div class="item"><span class="icon">✓</span>Liberdade real</div>
        <div class="item"><span class="icon">✓</span>Vida que é sua</div>
      </div>
    </div>
  </div>
  <div class="divider"></div>
  <div class="arrow">→</div>
  <div class="footer">
    <div class="footer-text">Heranças Invisíveis · <strong>20/05 Maringá</strong></div>
    <div class="cta">Garantir vaga</div>
  </div>
</div>
</body>
</html>
