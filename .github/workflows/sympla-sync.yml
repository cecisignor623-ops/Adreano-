name: Sympla → Meta CAPI Sync

# Roda a cada 15 minutos (e quando der push em scripts/sympla-sync.js)
# Também dispara manualmente via aba Actions do GitHub.
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: # botão "Run workflow" manual
  push:
    branches: [main]
    paths:
      - 'scripts/sympla-sync.js'
      - '.github/workflows/sympla-sync.yml'

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dotenv (única dependência)
        run: npm init -y && npm install --no-save dotenv

      - name: Run Sympla Sync
        env:
          SYMPLA_API_TOKEN: ${{ secrets.SYMPLA_API_TOKEN }}
          META_PIXEL_ID: ${{ secrets.META_PIXEL_ID }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
        run: node scripts/sympla-sync.js
