name: Sympla → Meta CAPI Sync

# ⚠️ AGENDAMENTO DESLIGADO. A fonte primária de Purchase agora é o webhook
# Sympla do tracking stack (/webhook/sympla/<slug>). Deixar o polling rodando
# a cada 15 min duplicaria a contagem de compras no Meta (event_id diferente).
# Mantido apenas o disparo MANUAL (workflow_dispatch) como fallback, caso o
# webhook fique indisponível. Para reativar o polling, descomente o bloco
# schedule abaixo E desative o webhook no painel do Sympla — nunca os dois juntos.
on:
  # schedule:
  #   - cron: '*/15 * * * *'
  workflow_dispatch: # botão "Run workflow" manual (fallback)

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dotenv (única dependência)
        run: npm init -y && npm install --no-save dotenv

      - name: Run Sympla Sync
        env:
          SYMPLA_API_TOKEN: ${{ secrets.SYMPLA_API_TOKEN }}
          META_PIXEL_ID: ${{ secrets.META_PIXEL_ID }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
        run: node scripts/sympla-sync.js
